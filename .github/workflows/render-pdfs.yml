name: Render campaign PDFs

on:
  push:
    branches: [main]
    paths:
      - "scripts/*.py"
      - "assets/brand/pmi-wordmark.png"
      - "resume.html"
      - "cover-letter.html"
      - ".github/workflows/render-pdfs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install reportlab pypdf cairosvg pillow
      - name: Retrieve and rasterize the official PMI wordmark
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets/brand
          curl --fail --location --retry 3 --retry-delay 2 \
            "https://www.pmi.com/resources/images/default-source/default-album/pmi-logoa4f115bd6c7468f696e2ff0400458fff.svg?sfvrsn=37857db4_0" \
            --output assets/brand/pmi-wordmark.svg
          grep -qi '<svg' assets/brand/pmi-wordmark.svg
          python - <<'PY'
          import cairosvg
          from PIL import Image
          cairosvg.svg2png(url='assets/brand/pmi-wordmark.svg', write_to='assets/brand/pmi-wordmark-hires.png', output_width=1408)
          Image.open('assets/brand/pmi-wordmark-hires.png').save('assets/brand/pmi-wordmark.png', optimize=True)
          image = Image.open('assets/brand/pmi-wordmark.png')
          assert image.width >= 1000, image.size
          assert image.mode in ('RGBA', 'LA'), image.mode
          print('PMI wordmark:', image.size, image.mode)
          PY
      - run: python scripts/render_pdfs.py
      - name: Verify page counts and contact contract
        run: |
          python - <<'PY'
          from pathlib import Path
          from pypdf import PdfReader
          expected = {
            'Russell-Dudek-PMI-Resume.pdf': 2,
            'Russell-Dudek-PMI-Cover-Letter.pdf': 1,
            'PMI-Interview-Thesis-Brief.pdf': 2,
            'PMI-120-Day-Entry-Plan.pdf': 1,
            'PMI-Hard-Objection-Analysis.pdf': 1,
          }
          required = ['412.287.8640', 'russelldudek@gmail.com', 'linkedin.com/in/russelldudek', 'github.com/russelldudek/PhilipMorris']
          extracted = {}
          for name, pages in expected.items():
              reader = PdfReader(str(Path('docs') / name))
              assert len(reader.pages) == pages, f'{name}: expected {pages}, got {len(reader.pages)}'
              text = ' '.join(' '.join((page.extract_text() or '').split()) for page in reader.pages)
              extracted[name] = text
              for value in required:
                  assert value in text, f'{name}: missing {value}'
          assert 'The repository contains the candidate vision' in extracted['Russell-Dudek-PMI-Cover-Letter.pdf']
          PY
      - name: Commit generated assets and PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/brand/pmi-wordmark.svg assets/brand/pmi-wordmark.png assets/brand/pmi-wordmark-hires.png docs/*.pdf
          if git diff --cached --quiet; then
            echo "Assets and PDFs are current."
          else
            git commit -m "Regenerate PMI application assets and PDFs [skip ci]"
            git push
          fi
