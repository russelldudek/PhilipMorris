name: Visual QA

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "*.html"
      - "*.css"
      - "app.js"
      - "assets/**"
      - "scripts/visual_qa.mjs"
      - ".github/workflows/visual-qa.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rendered-qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Prepare official PMI wordmark for rendered QA
        shell: bash
        run: |
          set -euo pipefail
          pip install cairosvg pillow
          curl --fail --location --retry 3 --retry-delay 2 \
            "https://www.pmi.com/resources/images/default-source/default-album/pmi-logoa4f115bd6c7468f696e2ff0400458fff.svg?sfvrsn=37857db4_0" \
            --output /tmp/pmi-wordmark.svg
          grep -qi '<svg' /tmp/pmi-wordmark.svg
          python - <<'PY'
          import cairosvg
          from PIL import Image
          cairosvg.svg2png(url='/tmp/pmi-wordmark.svg', write_to='assets/brand/pmi-wordmark.png', output_width=1408)
          image = Image.open('assets/brand/pmi-wordmark.png')
          assert image.width >= 1000, image.size
          PY
      - name: Install Playwright QA dependencies
        run: |
          npm install --no-save playwright @axe-core/playwright
          npx playwright install --with-deps chromium
      - name: Start static campaign server
        run: |
          python -m http.server 4173 --bind 127.0.0.1 > /tmp/pmi-server.log 2>&1 &
          echo $! > /tmp/pmi-server.pid
          for i in {1..30}; do
            curl --silent --fail http://127.0.0.1:4173/index.html >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/pmi-server.log
          exit 1
      - name: Run multi-viewport, interaction, contrast, and contact QA
        run: node scripts/visual_qa.mjs
      - name: Upload rendered QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmi-visual-qa
          path: qa-output/
          if-no-files-found: error
