name: Visual QA

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "*.html"
      - "*.css"
      - "app.js"
      - "assets/**"
      - "scripts/visual_qa.mjs"
      - ".github/workflows/visual-qa.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rendered-qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Prepare the user-selected PMI wordmark for rendered QA
        shell: bash
        run: |
          set -euo pipefail
          pip install pillow
          curl --fail --location --retry 3 --retry-delay 2 \
            "https://seekvectorlogo.net/wp-content/uploads/2019/10/philip-morris-international-pmi-vector-logo.png" \
            --output /tmp/pmi-wordmark-source.png
          python - <<'PY'
          from collections import Counter
          from PIL import Image

          source = Image.open('/tmp/pmi-wordmark-source.png').convert('RGB')
          assert source.width >= 800 and source.height >= 400, source.size
          mask = Image.new('L', source.size, 0)
          mask_px = mask.load()
          source_px = source.load()
          for y in range(source.height):
              for x in range(source.width):
                  r, g, b = source_px[x, y]
                  if min(r, g, b) < 248:
                      mask_px[x, y] = 255
          bbox = mask.getbbox()
          assert bbox
          padding = 12
          crop = source.crop((
              max(0, bbox[0] - padding),
              max(0, bbox[1] - padding),
              min(source.width, bbox[2] + padding),
              min(source.height, bbox[3] + padding),
          ))
          candidates = [pixel for pixel in crop.getdata() if pixel[2] > pixel[1] > pixel[0] and pixel[0] < 80]
          dominant = Counter(candidates).most_common(1)[0][0]
          transparent = Image.new('RGBA', crop.size, dominant + (0,))
          src = crop.load()
          dst = transparent.load()
          denominator = max(1, 255 - dominant[0])
          for y in range(crop.height):
              for x in range(crop.width):
                  r, g, b = src[x, y]
                  alpha = round((255 - r) / denominator * 255)
                  alpha = 0 if alpha < 4 else 255 if alpha > 251 else alpha
                  dst[x, y] = dominant + (max(0, min(255, alpha)),)
          ratio = transparent.width / transparent.height
          assert 3.5 <= ratio <= 4.2, (transparent.size, ratio)
          transparent.save('assets/brand/pmi-wordmark.png', optimize=True)
          print('QA wordmark:', transparent.size, transparent.mode, dominant)
          PY
      - name: Install Playwright QA dependencies
        run: |
          npm install --no-save playwright @axe-core/playwright
          npx playwright install --with-deps chromium
      - name: Start static campaign server
        run: |
          python -m http.server 4173 --bind 127.0.0.1 > /tmp/pmi-server.log 2>&1 &
          echo $! > /tmp/pmi-server.pid
          for i in {1..30}; do
            curl --silent --fail http://127.0.0.1:4173/index.html >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/pmi-server.log
          exit 1
      - name: Run multi-viewport, interaction, contrast, and contact QA
        run: node scripts/visual_qa.mjs
      - name: Upload rendered QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmi-visual-qa
          path: qa-output/
          if-no-files-found: error